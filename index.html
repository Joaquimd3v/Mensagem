<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>archive</title>

  <link rel="stylesheet" href="styles.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <link
    rel="preload"
    as="image"
    href="/assets/mari.png"
  />

</head>

<body>

  <div class="app">

    <!-- SPLASH -->

    <section id="splash">

      <div class="logo-container">

        <div class="logo">
          M
        </div>

      </div>

      <h1>
        Carregando memórias
      </h1>

      <p>
        Restaurando conversa...
      </p>

      <div class="loading-bar">
        <div class="loading-progress"></div>
      </div>

    </section>

    <!-- PROFILE -->

    <section id="profile-screen">

      <header class="profile-header">

        <div class="left">

          <div class="circle-btn">
            ←
          </div>

          <img
            class="small-avatar"
            src="/assets/mari.png"
          />

          <span class="username">
            Mrx_1602
          </span>

        </div>

        <div class="header-actions">
          🔔 ⋯
        </div>

      </header>

      <div class="profile-content">

        <img
          class="profile-avatar"
          src="/assets/mari.png"
        />

        <h2>
          Mrx_1602
        </h2>

        <span class="profile-info">
          redditor há 125d • 23 karma
        </span>

        <span class="profile-sub">
          the beginning of everything
        </span>

      </div>

    </section>

    <!-- CHAT -->

    <section id="chat-screen">

      <header class="chat-header">

        <div class="left">

          <div class="circle-btn">
            ←
          </div>

          <img
            class="small-avatar"
            src="/assets/mari.png"
          />

          <span class="username">
            Mrx_1602
          </span>

        </div>

        <div class="header-actions">
          🔔 ⋯
        </div>

      </header>

      <main id="messages-container"></main>

      <footer class="chat-input">

        <div class="plus-btn">
          +
        </div>

        <div class="fake-input">
          Mensagem
        </div>

        <div class="send-btn">
          ➤
        </div>

      </footer>

    </section>

  </div>

  <script src="script.js"></script>

</body>

</html>
